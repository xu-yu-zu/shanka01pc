<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>老皇的暗流记忆术 - 只点亮“能用”的技能树</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0c0a09; --card: #1c1917; --amber: #d97706; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: #e7e5e4; height: 100vh; display: flex; flex-direction: column; margin: 0; overflow: hidden; }
        .word-font { font-family: 'Montserrat', sans-serif; font-weight: 900; }
        .perspective { perspective: 2000px; }
        .preserve-3d { transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .active-scale:active { transform: scale(0.95); transition: 0.1s; }
        .node-card:hover { border-color: var(--amber); box-shadow: 0 0 30px rgba(217,119,6,0.15); }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-16 flex-none border-b border-amber-900/30 flex items-center justify-between px-12 bg-black/40 z-50">
        <div id="back-btn" class="hidden cursor-pointer flex items-center gap-2 text-amber-600 hover:text-amber-500 transition-colors" onclick="exitToHome()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            <span class="font-black italic uppercase tracking-tighter text-sm">Exit</span>
        </div>
        <h1 class="text-lg font-black tracking-[0.2em] text-amber-600 uppercase italic">老皇的暗流记忆术 - 只点亮“能用”的技能树</h1>
        <div class="w-20 text-[10px] text-stone-600 font-mono uppercase">V6.0 Iteration</div>
    </header>

    <main id="home-screen" class="flex-1 overflow-y-auto p-12">
        <div id="group-list" class="max-w-6xl mx-auto grid grid-cols-6 gap-6"></div>
    </main>

    <main id="study-screen" class="hidden flex-1 flex flex-col items-center justify-between py-8 px-12 relative overflow-hidden">
        <!-- Iterated Progress Bar with Text -->
        <div class="w-full max-w-5xl flex items-center gap-6">
            <div class="flex-1 bg-stone-900 h-1.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-amber-600 transition-all duration-500 w-0"></div>
            </div>
            <span id="progress-text" class="text-amber-600 font-mono font-bold text-lg min-w-[60px] text-right">0 / 10</span>
        </div>
        
        <div class="w-full max-w-6xl flex-1 mt-8 mb-8 perspective">
            <div id="card-inner" class="relative w-full h-full preserve-3d cursor-pointer" onclick="flipCard()">
                <!-- Front -->
                <div class="absolute inset-0 backface-hidden bg-stone-900 rounded-[2rem] border border-amber-900/20 flex flex-col items-center justify-center p-12 shadow-2xl">
                    <h3 id="front-word" class="word-font text-9xl text-amber-500 tracking-tighter mb-12"></h3>
                    <div class="bg-black/40 px-12 py-8 rounded-3xl border border-amber-900/10">
                        <p id="front-en" class="text-stone-400 italic text-2xl leading-relaxed text-center"></p>
                    </div>
                    <p class="absolute bottom-10 text-stone-800 font-bold tracking-[1em] uppercase text-sm">Space to Decode</p>
                </div>
                <!-- Back: PC Split Layout -->
                <div class="absolute inset-0 backface-hidden bg-stone-900 rotate-y-180 rounded-[2rem] border-2 border-amber-600/30 p-10 shadow-2xl flex flex-col">
                    <div class="flex items-end justify-between border-b border-amber-900/20 pb-6 mb-8">
                        <div class="flex items-baseline gap-6">
                            <h3 id="back-word" class="word-font text-6xl text-amber-500"></h3>
                            <p id="back-phonetic" class="text-2xl text-amber-800 font-mono"></p>
                        </div>
                        <div id="back-def" class="text-3xl font-black text-amber-100 bg-amber-900/20 px-8 py-3 rounded-2xl border border-amber-900/30"></div>
                    </div>
                    <div class="flex-1 grid grid-cols-2 gap-12 overflow-hidden">
                        <div class="space-y-6">
                            <div class="bg-stone-800/40 p-8 rounded-3xl border border-stone-800 h-full">
                                <span class="text-xs text-amber-600 font-black uppercase tracking-widest block mb-4">Logic / 物理拆解分析</span>
                                <div id="back-root" class="text-4xl font-black text-stone-100 mb-4 italic tracking-tighter"></div>
                                <p id="back-root-analysis" class="text-stone-400 text-xl leading-relaxed"></p>
                            </div>
                        </div>
                        <div class="flex flex-col justify-center bg-black/20 p-8 rounded-3xl border border-stone-900">
                            <span class="text-xs text-stone-600 font-black uppercase tracking-widest block mb-4">Deep Context对照</span>
                            <p id="back-en" class="text-stone-200 italic text-2xl leading-snug mb-4"></p>
                            <p id="back-cn" class="text-stone-500 text-xl font-bold"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full max-w-4xl grid grid-cols-3 gap-6 h-24">
            <button onclick="handleNext('forgot')" class="active-scale bg-stone-900 rounded-2xl border border-stone-800 flex flex-col items-center justify-center hover:bg-red-950 transition-colors">
                <span class="text-stone-500 font-black text-lg uppercase">1 忘记 / Forgot</span>
            </button>
            <button onclick="handleNext('blurred')" class="active-scale bg-stone-900 rounded-2xl border border-stone-800 flex flex-col items-center justify-center hover:bg-amber-950 transition-colors">
                <span class="text-stone-500 font-black text-lg uppercase">2 模糊 / Blurred</span>
            </button>
            <button onclick="handleNext('know')" class="active-scale bg-amber-900/20 rounded-2xl border border-amber-600/40 flex flex-col items-center justify-center hover:bg-amber-600 hover:text-black transition-all">
                <span class="text-amber-600 font-black text-2xl uppercase">3 认识 / Know</span>
            </button>
        </div>
    </main>

    <script>
        const masterData = [
            { word: "abandon", phonetic: "[ә'bændәn]", def: "丢弃, 放弃", root: "a | ban | don", analysis: "a (加强) + ban (控制) + don (给予) = 彻底不再控制", en: "The captain ordered everyone to abandon the ship.", cn: "船长命令大家弃船。" },
            { word: "abandoned", phonetic: "[ә'bændәnd]", def: "被抛弃的", root: "abandon | ed", analysis: "abandon (放弃) + ed (状态) = 处于被抛弃的状态", en: "The child was found in an abandoned house.", cn: "那孩子是在一所废弃的房子里被发现的。" },
            { word: "abortion", phonetic: "[ә'bɔ:ʃәn]", def: "流产, 失败", root: "ab | ort | ion", analysis: "ab (离开) + ort (出生) = 使其不能顺利出生", en: "The plan ended in abortion.", cn: "计划最终失败了。" },
            { word: "abroad", phonetic: "[ә'brɔ:d]", def: "在国外", root: "a | broad", analysis: "a (在) + broad (宽阔地) = 在更宽广的外面", en: "He often goes abroad on business.", cn: "他经常去国外出差。" },
            { word: "absence", phonetic: "['æbsәns]", def: "缺席, 缺乏", root: "ab | sence", analysis: "ab (离开) + sence (存在) = 不在场", en: "The decision was made in my absence.", cn: "决定是在我不在场时做出的。" },
            { word: "absolute", phonetic: "['æbsәlu:t]", def: "绝对的, 纯粹的", root: "ab | solute", analysis: "ab (离开) + solute (松开) = 摆脱了一切限制", en: "You have my absolute trust.", cn: "你得到了我绝对的信任。" },
            { word: "academic", phonetic: "[ækә'demik]", def: "学术的", root: "academ | ic", analysis: "academy (学院) + ic (后缀) = 象牙塔里的学术感", en: "He has a strong academic background.", cn: "他有深厚的学术背景。" },
            { word: "acceptable", phonetic: "[әk'septәbl]", def: "可接受的", root: "ac | cept | able", analysis: "ac (去) + cept (拿) + able (能) = 能够拿得住的", en: "This solution is acceptable to us.", cn: "这个方案对我们来说是可接受的。" },
            { word: "access", phonetic: "['ækses]", def: "入口, 通道", root: "ac | cess", analysis: "ac (去) + cess (走) = 走过去的方法", en: "The only access to the farm is a narrow road.", cn: "去农场的唯一通道是一条窄路。" },
            { word: "accident", phonetic: "['æksidәnt]", def: "意外, 事故", root: "ac | cid | ent", analysis: "ac (向) + cid (落下) = 突然掉落的事情", en: "The accident happened at midnight.", cn: "事故发生在午夜。" },
            { word: "accompany", phonetic: "[ә'kʌmpәni]", def: "陪同, 伴随", root: "ac | company", analysis: "ac (去) + company (同伴) = 去当同伴", en: "He accompanied her to the airport.", cn: "他陪她去了机场。" },
            { word: "accurate", phonetic: "['ækjurit]", def: "准确的", root: "ac | cur | ate", analysis: "ac (加强) + cur (关心) = 因为用心关注，所以准确", en: "The clock is very accurate.", cn: "这台时钟非常准确。" },
            { word: "acid", phonetic: "['æsid]", def: "酸的, 尖刻的", root: "acid", analysis: "源自尖刺感。酸能刺痛舌头", en: "She has an acid tongue.", cn: "她说话言语尖刻。" },
            { word: "acknowledge", phonetic: "[әk'nɔlidʒ]", def: "承认, 感谢", root: "ac | knowledge", analysis: "ac (对) + knowledge (知晓) = 接收已知事实", en: "He refused to acknowledge his mistake.", cn: "他拒绝承认自己的错误。" },
            { word: "acquire", phonetic: "[ә'kwaiә]", def: "获得, 学到", root: "ac | quire", analysis: "ac (加强) + quire (追求) = 追求并拿到", en: "He acquired a taste for wine.", cn: "他开始养成了品酒的嗜好。" },
            { word: "acquisition", phonetic: "['ækwi'ziʃәn]", def: "获得, 习得", root: "ac | quisit | ion", analysis: "acquire的名词形式", en: "The acquisition of knowledge is a lifelong process.", cn: "知识的习得是一个终身的过程。" },
            { word: "acre", phonetic: "['eikә]", def: "英亩", root: "acre", analysis: "源自 field。指一头牛一天能耕完的面积", en: "He owns forty acres of land.", cn: "他拥有40英亩土地。" },
            { word: "activism", phonetic: "['æktivizm]", def: "实践主义", root: "activ | ism", analysis: "active (行动) + ism (主义) = 强调行动", en: "She is involved in environmental activism.", cn: "她参与了环保实践行动。" },
            { word: "actor", phonetic: "['æktә]", def: "男演员", root: "act | or", analysis: "act (行动) + or (人) = 表演者", en: "He is a famous Hollywood actor.", cn: "他是著名的好莱坞男演员。" },
            { word: "actress", phonetic: "['æktris]", def: "女演员", root: "actr | ess", analysis: "ess (女性后缀)", en: "The actress won an award.", cn: "这位女演员获奖了。" },
            { word: "actual", phonetic: "['æktjuәl]", def: "实际的", root: "act | ual", analysis: "act (事实) + ual = 真实存在的", en: "The actual cost was higher than expected.", cn: "实际成本比预期的要高。" },
            { word: "adequate", phonetic: "['ædikwit]", def: "足够的", root: "ad | equ | ate", analysis: "ad (去) + equ (平等) = 达到水平线了", en: "The food was adequate for the party.", cn: "聚会的食物足够了。" },
            { word: "adjust", phonetic: "[ә'dʒʌst]", def: "调整, 校正", root: "ad | just", analysis: "ad (去) + just (正) = 使其变端正", en: "It took time to adjust to the new environment.", cn: "适应新环境需要时间。" },
            { word: "admire", phonetic: "[әd'maiә]", def: "钦佩, 赞赏", root: "ad | mire", analysis: "ad (向) + mire (看) = 看着奇迹发出赞叹", en: "I really admire your courage.", cn: "我真的很钦佩你的勇气。" },
            { word: "advanced", phonetic: "[әd'va:nst]", def: "先进的", root: "ad | vance | ed", analysis: "vance (前进)。走在前面的", en: "They are studying advanced physics.", cn: "他们正在学习高级物理学。" },
            { word: "advertise", phonetic: "['ædvәtaiz]", def: "登广告", root: "ad | vert | ise", analysis: "ad (向) + vert (转) = 让人转过来看", en: "They advertised for a new manager.", cn: "他们登广告招聘新经理。" },
            { word: "advise", phonetic: "[әd'vaiz]", def: "劝告, 建议", root: "ad | vise", analysis: "ad (向) + vise (看) = 展示你的看法", en: "I advise you to stay at home.", cn: "我建议你留在家里。" },
            { word: "adviser", phonetic: "[әd'vaizә]", def: "顾问", root: "advise | er", analysis: "建议者", en: "He is a financial adviser.", cn: "他是一名财务顾问。" },
            { word: "advocate", phonetic: "['ædvәkit]", def: "拥护者", root: "ad | voc | ate", analysis: "ad (加强) + voc (叫喊) = 为某事大声疾呼", en: "He is an advocate of free speech.", cn: "他是言论自由的拥护者。" },
            { word: "afford", phonetic: "[ә'fɔ:d]", def: "负担得起", root: "af | ford", analysis: "ford (前进/完成)。能拿出足够能力去完成", en: "I can't afford a new car.", cn: "我买不起新车。" }
        ];

        let currentSet = [], currentIndex = 0, isFlipped = false;

        function initHome() {
            const list = document.getElementById('group-list');
            list.innerHTML = '';
            for (let i = 0; i < Math.ceil(masterData.length/10); i++) {
                const btn = document.createElement('div');
                btn.className = 'node-card bg-stone-900 p-10 rounded-[3rem] text-center border border-stone-800 cursor-pointer transition-all active-scale';
                btn.innerHTML = `<p class="text-[10px] text-stone-600 font-black uppercase mb-4">Node</p><p class="text-5xl font-black text-amber-700 word-font">${(i+1).toString().padStart(2, '0')}</p>`;
                btn.onclick = () => startStudy(i);
                list.appendChild(btn);
            }
        }

        function startStudy(idx) {
            currentSet = [...masterData.slice(idx*10, idx*10+10)].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('study-screen').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            updateCard();
        }

        function exitToHome() {
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('study-screen').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            if(isFlipped) flipCard();
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('card-inner').style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
        }

        function updateCard() {
            const d = currentSet[currentIndex];
            document.getElementById('front-word').innerText = d.word;
            document.getElementById('front-en').innerText = d.en;
            document.getElementById('back-word').innerText = d.word;
            document.getElementById('back-phonetic').innerText = d.phonetic;
            document.getElementById('back-def').innerText = d.def;
            document.getElementById('back-root').innerText = d.root;
            document.getElementById('back-root-analysis').innerText = d.analysis;
            document.getElementById('back-en').innerText = d.en;
            document.getElementById('back-cn').innerText = d.cn;
            
            // Progress Update
            const prog = ((currentIndex + 1) / currentSet.length) * 100;
            document.getElementById('progress-bar').style.width = `${prog}%`;
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${currentSet.length}`;
        }

        function handleNext() {
            if(isFlipped) flipCard();
            setTimeout(() => {
                if(currentIndex < currentSet.length - 1) { currentIndex++; updateCard(); }
                else { alert("Set Complete"); exitToHome(); }
            }, 300);
        }

        window.addEventListener('keydown', (e) => {
            if (document.getElementById('study-screen').classList.contains('hidden')) return;
            if (e.code === 'Space') flipCard();
            if (e.key === '1' || e.key === '2' || e.key === '3') handleNext();
        });

        initHome();
    </script>
</body>
</html>
